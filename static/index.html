<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nutshell — YouTube Video Summarizer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body { background: #0f1117; color: #e2e8f0; }
    .prose h2 { color: #38bdf8; font-size: 1.1rem; font-weight: 700; margin: 1.2rem 0 0.4rem; border-bottom: 1px solid #1e293b; padding-bottom: 0.2rem; }
    .prose ul { list-style: disc; padding-left: 1.5rem; }
    .prose li { margin: 0.25rem 0; }
    .prose strong { color: #f0f9ff; }
    .prose p { margin: 0.4rem 0; line-height: 1.6; }
    #spinner-general.active, #spinner-financial.active { display:flex; }
    #spinner-general, #spinner-financial { display:none; }
  </style>
</head>
<body class="min-h-screen font-mono">

  <!-- Header -->
  <header class="border-b border-slate-800 px-6 py-4 flex items-center justify-between">
    <div>
      <h1 class="text-lg font-bold text-sky-400">Nutshell</h1>
      <p class="text-xs text-slate-500">AI summaries for any YouTube video</p>
    </div>
    <nav class="flex items-center gap-4 text-sm">
      <button onclick="showTab('general')" id="tab-general"
        class="tab-btn text-sky-400 border-b border-sky-400 pb-1">General</button>
      <button onclick="showTab('financial')" id="tab-financial"
        class="tab-btn text-slate-500 hover:text-slate-300 pb-1">Financial</button>
      <button onclick="showTab('history')" id="tab-history"
        class="tab-btn text-slate-500 hover:text-slate-300 pb-1">History</button>
    </nav>
  </header>

  <main class="max-w-4xl mx-auto px-4 py-8">

    <!-- Supadata monthly quota (shared, mode-agnostic) -->
    <div id="quota-line" class="mb-4 text-xs text-slate-600 hidden">
      <span id="quota-text"></span>
    </div>

    <!-- ── GENERAL TAB ── -->
    <div id="tab-general-content">
      <div class="bg-slate-900 border border-slate-700 rounded-xl p-6 mb-6">
        <label class="block text-sm text-slate-400 mb-2">YouTube URL</label>
        <input id="url-input-general" type="text"
          placeholder="https://www.youtube.com/watch?v=..."
          oninput="onUrlInput('general')"
          class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-3 text-sm
                 focus:outline-none focus:border-sky-500 placeholder-slate-600 mb-4" />

        <div class="flex items-center gap-4 flex-wrap">
          <button onclick="doSummarize('general', false)"
            class="bg-sky-600 hover:bg-sky-500 text-white px-5 py-2 rounded-lg text-sm font-medium transition">
            Full Notes
          </button>
          <button onclick="doSummarize('general', true)"
            class="bg-slate-700 hover:bg-slate-600 text-white px-5 py-2 rounded-lg text-sm font-medium transition">
            Brief TL;DR
          </button>
          <button id="playlist-btn-general" onclick="doPlaylist('general')"
            class="hidden bg-violet-700 hover:bg-violet-600 text-white px-5 py-2 rounded-lg text-sm font-medium transition">
            Summarize Playlist
          </button>
        </div>
      </div>

      <div id="spinner-general" class="items-center gap-3 text-slate-400 text-sm mb-6 hidden">
        <svg class="animate-spin h-5 w-5 text-sky-500" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
        </svg>
        <span id="spinner-msg-general">Fetching transcript...</span>
      </div>

      <div id="error-box-general" class="hidden bg-red-950 border border-red-800 text-red-300
                                          rounded-lg px-4 py-3 text-sm mb-6">
        <div class="flex items-center justify-between gap-4">
          <span id="error-msg-general"></span>
          <button onclick="retryLast('general')"
            class="shrink-0 bg-red-900 hover:bg-red-800 text-red-200 px-3 py-1 rounded-lg text-xs">Retry</button>
        </div>
      </div>

      <div id="result-box-general" class="hidden">
        <div id="result-header-general" class="hidden items-center gap-3 mb-3"></div>
        <div class="bg-slate-900 border border-slate-700 rounded-xl p-6">
          <div id="notes-content-general" class="prose text-sm text-slate-300"></div>
        </div>
        <div class="flex items-center justify-between gap-4 mt-2 flex-wrap">
          <p class="text-xs text-slate-600" id="result-meta-general"></p>
          <div class="flex items-center gap-2">
            <button onclick="copyNotes('general')"
              class="text-xs text-slate-400 hover:text-sky-400 border border-slate-700 hover:border-sky-700 px-3 py-1 rounded-lg transition">Copy</button>
            <button onclick="copyShareLink('general')"
              class="text-xs text-slate-400 hover:text-sky-400 border border-slate-700 hover:border-sky-700 px-3 py-1 rounded-lg transition">Share</button>
            <button onclick="regenerate('general')"
              class="text-xs text-slate-400 hover:text-sky-400 border border-slate-700 hover:border-sky-700 px-3 py-1 rounded-lg transition">Regenerate</button>
          </div>
        </div>
      </div>

      <div id="playlist-box-general" class="hidden">
        <p id="playlist-status-general" class="text-sm text-slate-400 mb-4"></p>
        <div id="playlist-results-general" class="space-y-3"></div>
      </div>
    </div>

    <!-- ── FINANCIAL TAB ── -->
    <div id="tab-financial-content" class="hidden">
      <div class="bg-slate-900 border border-slate-700 rounded-xl p-6 mb-6">
        <label class="block text-sm text-slate-400 mb-2">YouTube URL</label>
        <input id="url-input-financial" type="text"
          placeholder="https://www.youtube.com/watch?v=..."
          oninput="onUrlInput('financial')"
          class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-3 text-sm
                 focus:outline-none focus:border-sky-500 placeholder-slate-600 mb-4" />

        <div class="flex items-center gap-4 flex-wrap">
          <button onclick="doSummarize('financial', false)"
            class="bg-sky-600 hover:bg-sky-500 text-white px-5 py-2 rounded-lg text-sm font-medium transition">
            Full Notes
          </button>
          <button onclick="doSummarize('financial', true)"
            class="bg-slate-700 hover:bg-slate-600 text-white px-5 py-2 rounded-lg text-sm font-medium transition">
            Brief TL;DR
          </button>
          <button id="playlist-btn-financial" onclick="doPlaylist('financial')"
            class="hidden bg-violet-700 hover:bg-violet-600 text-white px-5 py-2 rounded-lg text-sm font-medium transition">
            Summarize Playlist
          </button>
        </div>
      </div>

      <div id="spinner-financial" class="items-center gap-3 text-slate-400 text-sm mb-6 hidden">
        <svg class="animate-spin h-5 w-5 text-sky-500" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
        </svg>
        <span id="spinner-msg-financial">Fetching transcript...</span>
      </div>

      <div id="error-box-financial" class="hidden bg-red-950 border border-red-800 text-red-300
                                            rounded-lg px-4 py-3 text-sm mb-6">
        <div class="flex items-center justify-between gap-4">
          <span id="error-msg-financial"></span>
          <button onclick="retryLast('financial')"
            class="shrink-0 bg-red-900 hover:bg-red-800 text-red-200 px-3 py-1 rounded-lg text-xs">Retry</button>
        </div>
      </div>

      <div id="result-box-financial" class="hidden">
        <div id="result-header-financial" class="hidden items-center gap-3 mb-3"></div>
        <div class="bg-slate-900 border border-slate-700 rounded-xl p-6">
          <div id="notes-content-financial" class="prose text-sm text-slate-300"></div>
        </div>
        <div class="flex items-center justify-between gap-4 mt-2 flex-wrap">
          <p class="text-xs text-slate-600" id="result-meta-financial"></p>
          <div class="flex items-center gap-2">
            <button onclick="copyNotes('financial')"
              class="text-xs text-slate-400 hover:text-sky-400 border border-slate-700 hover:border-sky-700 px-3 py-1 rounded-lg transition">Copy</button>
            <button onclick="copyShareLink('financial')"
              class="text-xs text-slate-400 hover:text-sky-400 border border-slate-700 hover:border-sky-700 px-3 py-1 rounded-lg transition">Share</button>
            <button onclick="regenerate('financial')"
              class="text-xs text-slate-400 hover:text-sky-400 border border-slate-700 hover:border-sky-700 px-3 py-1 rounded-lg transition">Regenerate</button>
          </div>
        </div>
      </div>

      <div id="playlist-box-financial" class="hidden">
        <p id="playlist-status-financial" class="text-sm text-slate-400 mb-4"></p>
        <div id="playlist-results-financial" class="space-y-3"></div>
      </div>
    </div>

    <!-- ── HISTORY TAB ── -->
    <div id="tab-history-content" class="hidden">
      <div class="flex items-center gap-3 mb-4">
        <input id="history-search" type="text" placeholder="Search history…"
          oninput="renderHistory()"
          class="flex-1 bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 text-sm
                 focus:outline-none focus:border-sky-500 placeholder-slate-600" />
        <button onclick="clearAllHistory()"
          class="shrink-0 text-xs text-slate-500 hover:text-red-400 border border-slate-700 hover:border-red-800 px-3 py-2 rounded-lg transition">
          Clear All
        </button>
      </div>
      <div id="history-list" class="space-y-3"></div>
    </div>

  </main>

<script>
const API = '';
const MODE_FOR_TAB = { general: 'general', financial: 'stock' };
let _lastRequest = {};  // tab -> {url, brief}
let _lastResult  = {};  // tab -> last response data

// ── Bootstrap ─────────────────────────────────────────────────────────
async function init() {
  // Supadata quota
  try {
    const q = await fetch(`${API}/api/quota`).then(r => r.json());
    const el = document.getElementById('quota-text');
    const wrap = document.getElementById('quota-line');
    const color = q.remaining <= 10 ? 'text-amber-500' : 'text-slate-600';
    el.className = color;
    el.textContent = `Transcript quota: ${q.remaining} of ${q.limit} remaining this month`;
    wrap.classList.remove('hidden');
  } catch(_) {}

  // Deep-link to a summary
  const params = new URLSearchParams(location.search);
  if (params.has('summary')) {
    const data = await fetch(`${API}/api/summaries/${params.get('summary')}`).then(r => r.json()).catch(() => null);
    if (data) {
      const tab = /## Thesis/.test(data.notes || '') ? 'financial' : 'general';
      document.getElementById(`url-input-${tab}`).value = data.url;
      showResult(tab, data);
      showTab(tab);
    }
  }
}

// ── Tab switching ─────────────────────────────────────────────────────
function showTab(name) {
  ['general','financial','history'].forEach(t => {
    const content = document.getElementById(`tab-${t}-content`);
    if (content) content.classList.add('hidden');
    const btn = document.getElementById(`tab-${t}`);
    if (btn) {
      btn.classList.remove('text-sky-400','border-b','border-sky-400');
      btn.classList.add('text-slate-500');
    }
  });
  document.getElementById(`tab-${name}-content`).classList.remove('hidden');
  const active = document.getElementById(`tab-${name}`);
  if (active) {
    active.classList.remove('text-slate-500');
    active.classList.add('text-sky-400','border-b','border-sky-400');
  }
  if (name === 'history') loadHistory();
}

// ── Summarize ─────────────────────────────────────────────────────────
async function doSummarize(tab, brief) {
  const url = document.getElementById(`url-input-${tab}`).value.trim();
  if (!url) return;
  const mode = MODE_FOR_TAB[tab];
  _lastRequest[tab] = {url, brief};

  setSpinner(tab, true, brief ? 'Generating brief summary...' : 'Fetching transcript...');
  hideError(tab);
  document.getElementById(`result-box-${tab}`).classList.add('hidden');

  try {
    const res  = await fetch(`${API}/api/summarize`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({url, brief, mode}),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Unknown error');
    showResult(tab, data);
  } catch(e) {
    showError(tab, e.message);
  } finally {
    setSpinner(tab, false);
  }
}

function retryLast(tab) {
  const req = _lastRequest[tab];
  if (!req) return;
  document.getElementById(`url-input-${tab}`).value = req.url;
  doSummarize(tab, req.brief);
}

function regenerate(tab) {
  const req = _lastRequest[tab];
  if (!req) return;
  document.getElementById(`url-input-${tab}`).value = req.url;
  doSummarize(tab, !req.brief);
}

async function copyNotes(tab) {
  const data = _lastResult[tab];
  if (!data) return;
  try {
    await navigator.clipboard.writeText(data.notes || '');
  } catch(e) { alert('Could not copy: ' + e.message); }
}

async function copyShareLink(tab) {
  const data = _lastResult[tab];
  if (!data) return;
  const link = `${location.origin}/?summary=${data.id}`;
  try {
    await navigator.clipboard.writeText(link);
  } catch(e) { alert('Could not copy: ' + e.message); }
}

// ── URL input detection ───────────────────────────────────────────────
function onUrlInput(tab) {
  const url = document.getElementById(`url-input-${tab}`).value.trim();
  const isPlaylist = /[?&]list=/.test(url) && !/watch/.test(url);
  document.getElementById(`playlist-btn-${tab}`).classList.toggle('hidden', !isPlaylist);
}

// ── Playlist ──────────────────────────────────────────────────────────
async function doPlaylist(tab) {
  const url = document.getElementById(`url-input-${tab}`).value.trim();
  if (!url) return;
  const mode = MODE_FOR_TAB[tab];

  document.getElementById(`result-box-${tab}`).classList.add('hidden');
  document.getElementById(`playlist-box-${tab}`).classList.remove('hidden');
  document.getElementById(`playlist-results-${tab}`).innerHTML = '';
  document.getElementById(`playlist-status-${tab}`).textContent = 'Fetching playlist…';
  document.getElementById(`error-box-${tab}`).classList.add('hidden');

  try {
    const res = await fetch(`${API}/api/summarize/playlist`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({url, mode}),
    });

    if (!res.ok) {
      const data = await res.json();
      showError(tab, data.detail || 'Playlist error');
      document.getElementById(`playlist-box-${tab}`).classList.add('hidden');
      return;
    }

    const reader  = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, {stream: true});
      const chunks = buffer.split('\n\n');
      buffer = chunks.pop();
      for (const chunk of chunks) {
        if (!chunk.startsWith('data: ')) continue;
        const msg = JSON.parse(chunk.slice(6));
        if (msg.type === 'start') {
          document.getElementById(`playlist-status-${tab}`).textContent =
            `Processing 0 / ${msg.total} videos…`;
        } else if (msg.type === 'video') {
          document.getElementById(`playlist-status-${tab}`).textContent =
            `Processing ${msg.index + 1} / ${msg.total} videos…`;
          _appendPlaylistVideo(tab, msg);
        } else if (msg.type === 'error') {
          _appendPlaylistError(tab, msg);
        } else if (msg.type === 'done') {
          document.getElementById(`playlist-status-${tab}`).textContent = 'Done.';
        }
      }
    }
  } catch(e) {
    showError(tab, e.message);
    document.getElementById(`playlist-box-${tab}`).classList.add('hidden');
  }
}

function _appendPlaylistVideo(tab, data) {
  const thesis = extractThesis(data.notes);
  const el = document.createElement('div');
  el.className = 'bg-slate-900 border border-slate-700 rounded-xl p-4 cursor-pointer hover:border-sky-700 transition';
  el.onclick = () => { showResult(tab, data); showTab(tab); };
  el.innerHTML = `
    <div class="flex items-center gap-3 mb-2">
      ${_thumbHtml(data.thumbnail_url)}
      <p class="text-sm text-slate-200 font-medium truncate">${escapeHtml(data.title) || 'Video ' + (data.index + 1)}</p>
    </div>
    <p class="text-xs text-slate-500 mb-1">
      Video ${data.index + 1} of ${data.total} · ${data.word_count?.toLocaleString()} words
    </p>
    <p class="text-sm text-slate-200">${thesis}</p>
    <p class="text-xs text-slate-600 mt-1 truncate">${data.url}</p>`;
  document.getElementById(`playlist-results-${tab}`).appendChild(el);
}

function _appendPlaylistError(tab, data) {
  const el = document.createElement('div');
  el.className = 'bg-red-950 border border-red-800 rounded-xl p-4';
  el.innerHTML = `
    <p class="text-xs text-red-400">Video ${data.index + 1}: ${data.error}</p>
    <p class="text-xs text-slate-600">${data.url}</p>`;
  document.getElementById(`playlist-results-${tab}`).appendChild(el);
}

function _thumbHtml(url) {
  if (!url) return '';
  return `<img src="${url}" class="w-20 h-11 object-cover rounded-md border border-slate-700 shrink-0"
               onerror="this.remove()" />`;
}

function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s || '';
  return div.innerHTML;
}

function showResult(tab, data) {
  _lastResult[tab] = data;
  if (!_lastRequest[tab]) _lastRequest[tab] = {url: data.url, brief: data.brief};
  const header = document.getElementById(`result-header-${tab}`);
  if (data.thumbnail_url || data.title) {
    header.innerHTML = `
      ${_thumbHtml(data.thumbnail_url)}
      <p class="text-sm text-slate-200 font-medium">${escapeHtml(data.title)}</p>`;
    header.classList.remove('hidden');
    header.classList.add('flex');
  } else {
    header.classList.add('hidden');
    header.classList.remove('flex');
  }
  document.getElementById(`notes-content-${tab}`).innerHTML = marked.parse(data.notes || '');
  document.getElementById(`result-meta-${tab}`).textContent =
    `${data.word_count?.toLocaleString()} words · ${data.cached ? 'cached transcript' : 'fresh transcript'} · ID: ${data.id}`;
  document.getElementById(`result-box-${tab}`).classList.remove('hidden');
}

// ── History ───────────────────────────────────────────────────────────
let _historyNotes = {};
let _historyRows  = [];

async function loadHistory() {
  const list = document.getElementById('history-list');
  list.innerHTML = '<p class="text-slate-600 text-sm">Loading...</p>';
  try {
    _historyRows = await fetch(`${API}/api/history`).then(r => r.json());
    renderHistory();
  } catch(e) {
    list.innerHTML = `<p class="text-red-400 text-sm">${e.message}</p>`;
  }
}

function renderHistory() {
  const list  = document.getElementById('history-list');
  const query = (document.getElementById('history-search')?.value || '').trim().toLowerCase();
  const rows  = query
    ? _historyRows.filter(r =>
        (r.title || '').toLowerCase().includes(query) ||
        (r.notes || '').toLowerCase().includes(query) ||
        (r.url   || '').toLowerCase().includes(query))
    : _historyRows;

  if (!_historyRows.length) {
    list.innerHTML = '<p class="text-slate-600 text-sm">No summaries yet.</p>';
    return;
  }
  if (!rows.length) {
    list.innerHTML = '<p class="text-slate-600 text-sm">No matches.</p>';
    return;
  }

  _historyNotes = {};
  list.innerHTML = rows.map(r => {
    _historyNotes[r.id] = r.notes || '';
    const thesis = extractThesis(r.notes);
    const date   = r.created_at.slice(0,16).replace('T',' ');
    return `
      <div class="bg-slate-900 border border-slate-700 rounded-xl p-4" id="history-item-${r.id}">
        <div class="flex items-start justify-between gap-4 cursor-pointer hover:opacity-90"
             onclick="toggleHistoryItem('${r.id}')">
          <div class="flex items-start gap-3 min-w-0">
            ${_thumbHtml(r.thumbnail_url)}
            <div class="min-w-0">
              ${r.title ? `<p class="text-sm text-slate-200 font-medium truncate">${escapeHtml(r.title)}</p>` : ''}
              <p class="text-xs text-slate-500 mb-1">${date} · ${r.brief ? 'brief' : 'full'} · ${r.word_count?.toLocaleString()} words</p>
              <p class="text-sm text-slate-200">${thesis}</p>
              <p class="text-xs text-slate-600 mt-1 truncate max-w-lg">${r.url}</p>
            </div>
          </div>
          <div class="flex items-center gap-3 shrink-0">
            <span class="text-xs text-slate-600">${r.id}</span>
            <button onclick="event.stopPropagation(); deleteHistoryItem('${r.id}')"
              title="Delete"
              class="text-slate-600 hover:text-red-400 hover:bg-red-950/40 text-xs px-2 py-1 rounded transition">
              &times;
            </button>
          </div>
        </div>
        <div id="history-notes-${r.id}" class="hidden prose text-sm text-slate-300 mt-4 pt-4 border-t border-slate-800"></div>
      </div>`;
  }).join('');
}

async function clearAllHistory() {
  if (!_historyRows.length) return;
  if (!confirm(`Delete all ${_historyRows.length} history entries? This can't be undone.`)) return;
  try {
    await fetch(`${API}/api/history`, {method: 'DELETE'});
    _historyRows = [];
    _historyNotes = {};
    renderHistory();
  } catch(e) {
    alert(e.message);
  }
}

function toggleHistoryItem(id) {
  const panel = document.getElementById(`history-notes-${id}`);
  if (!panel) return;
  if (panel.classList.contains('hidden')) {
    panel.innerHTML = marked.parse(_historyNotes[id] || '');
    panel.classList.remove('hidden');
  } else {
    panel.classList.add('hidden');
  }
}

async function deleteHistoryItem(id) {
  try {
    await fetch(`${API}/api/summaries/${id}`, {method: 'DELETE'});
    delete _historyNotes[id];
    _historyRows = _historyRows.filter(r => r.id !== id);
    const el = document.getElementById(`history-item-${id}`);
    if (el) el.remove();
    const list = document.getElementById('history-list');
    if (!list.children.length) {
      list.innerHTML = '<p class="text-slate-600 text-sm">No summaries yet.</p>';
    }
  } catch(e) {
    alert(e.message);
  }
}

// ── Utilities ─────────────────────────────────────────────────────────
function extractThesis(notes) {
  const m = notes?.match(/## (?:Thesis|Overview|Summary)\s*\n+(.+)/);
  const t = m ? m[1].trim() : '—';
  return t.length > 100 ? t.slice(0,100) + '…' : t;
}

function setSpinner(tab, on, msg = '') {
  const el = document.getElementById(`spinner-${tab}`);
  el.classList.toggle('hidden', !on);
  el.classList.toggle('active', on);
  if (msg) document.getElementById(`spinner-msg-${tab}`).textContent = msg;
}

function showError(tab, msg) {
  document.getElementById(`error-msg-${tab}`).textContent = msg;
  document.getElementById(`error-box-${tab}`).classList.remove('hidden');
}

function hideError(tab) {
  document.getElementById(`error-box-${tab}`).classList.add('hidden');
}

// Enter key submits
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('url-input-general').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSummarize('general', false);
  });
  document.getElementById('url-input-financial').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSummarize('financial', false);
  });
  init();
});
</script>
